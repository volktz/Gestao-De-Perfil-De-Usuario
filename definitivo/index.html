<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil de Usuário</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="page-shell">
        <section class="profile-card" aria-labelledby="perfil-title">
            <header class="profile-header">
                <button class="btn-voltar" type="button" aria-label="Voltar">←</button>
                <h1 class="profile-title" id="perfil-title">Meu Perfil</h1>
            </header>

            <div class="profile-photo-container">
                <img src="../proto/img/image.png" alt="Foto de Perfil" class="profile-photo">
                <button class="edit-photo-btn" type="button" aria-label="Editar foto">✏</button>
            </div>

            <p class="remove-photo-text">Remover Foto Atual</p>

            <form class="profile-form" action="#" method="post">
                <div class="form-group">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" name="nome" value="Paulo H." placeholder="Digite seu nome completo">
                </div>

                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" value="paulo.h@empresa.com" placeholder="Digite seu e-mail" readonly>
                </div>

                <div class="form-group">
                    <label for="telefone">Telefone</label>
                    <input type="tel" id="telefone" name="telefone" value="(11) 98765-4321" placeholder="Digite seu telefone">
                </div>

                <div class="options-container" aria-label="Opções do perfil" href="/">
                    <a class="option-btn" href="/definitivo/html/alteracao-senha.html">
                        <div class="option-content">
                            <span class="option-title">Alterar Senha de Acesso</span>
                        </div>
                        <span class="arrow">&gt;</span>
                    </a>

                    <a class="option-btn" href="/definitivo/html/preferencias-notificacoes.html">
                        <div class="option-content">
                            <span class="option-title">Preferências e Notificações</span>
                            <p class="testezin">Gerenciar e-mails e alertas</p>
                        </div>
                        <span class="arrow">&gt;</span>
                    </a>
                </div>

                <button type="submit" class="btn-salvar">Salvar Alterações</button>
            </form>
        </section>
    </main>

</body>

</html>

<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alterar Senha</title>
    <link rel="stylesheet" href="../style.css">
</head>

<body>
    <main class="page-shell">
        <section class="profile-card" aria-labelledby="alteracao-senha-title">
            <header class="profile-header">
                <a class="btn-voltar btn-voltar-link" href="gestao-de-perfil.html" aria-label="Voltar">←</a>
                <h1 class="profile-title" id="alteracao-senha-title">Alterar Senha de Acesso</h1>
            </header>

            <form method="post" action="../script/alteracao-senha.php" id="changePasswordForm">
                <div class="form-group">
                    <label for="current-password">Senha Atual</label>
                    <input type="password" id="current-password" name="current-password" placeholder="Digite sua senha atual">
                </div>
                <div class="form-group">
                    <label for="new-password">Nova Senha</label>
                    <input type="password" id="new-password" name="new-password" placeholder="Digite sua nova senha">
                </div>
                <div class="form-group">
                    <label for="confirm-new-password">Confirmar Nova Senha</label>
                    <input type="password" id="confirm-new-password" name="confirm-new-password" placeholder="Confirme sua nova senha">
                    <p id="password-error" style="color: #e74c3c; font-size: 0.9em; margin-top: 5px; display: none;">As senhas não coincidem</p>
                </div>
                <button type="submit" class="btn-salvar" disabled>Salvar Alterações</button>
                <p id="password-save-feedback" class="save-feedback" style="display:none;"></p>
            </form>
        </section>
    </main>

    <script>
        const newPasswordInput = document.getElementById('new-password');
        const confirmPasswordInput = document.getElementById('confirm-new-password');
        const submitButton = document.querySelector('.btn-salvar');
        const passwordError = document.getElementById('password-error');
        const changePasswordForm = document.getElementById('changePasswordForm');
        const saveFeedback = document.getElementById('password-save-feedback');

        function validatePasswords() {
            const newPassword = newPasswordInput.value;
            const confirmPassword = confirmPasswordInput.value;

            if (confirmPassword && newPassword !== confirmPassword) {
                passwordError.style.display = 'block';
                submitButton.disabled = true;
            } else {
                passwordError.style.display = 'none';
                if (newPassword && confirmPassword && newPassword === confirmPassword) {
                    submitButton.disabled = false;
                } else {
                    submitButton.disabled = true;
                }
            }
        }

        newPasswordInput.addEventListener('input', validatePasswords);
        confirmPasswordInput.addEventListener('input', validatePasswords);

        if (changePasswordForm) {
            changePasswordForm.addEventListener('submit', async (event) => {
                event.preventDefault();

                const formData = new URLSearchParams();
                formData.set('current-password', document.getElementById('current-password').value);
                formData.set('new-password', newPasswordInput.value);
                formData.set('confirm-new-password', confirmPasswordInput.value);

                try {
                    const response = await fetch('../script/alteracao-senha.php', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8',
                        },
                        body: formData.toString(),
                    });

                    const result = await response.json();

                    if (!response.ok || !result.success) {
                        throw new Error(result.message || 'Nao foi possivel alterar a senha.');
                    }

                    if (saveFeedback) {
                        saveFeedback.textContent = result.message || 'Senha alterada com sucesso!';
                        saveFeedback.style.display = 'block';
                        saveFeedback.classList.remove('is-error');
                        saveFeedback.classList.add('is-success');
                    }

                    changePasswordForm.reset();
                    submitButton.disabled = true;
                    passwordError.style.display = 'none';
                } catch (error) {
                    if (saveFeedback) {
                        saveFeedback.textContent = error.message || 'Erro ao alterar a senha.';
                        saveFeedback.style.display = 'block';
                        saveFeedback.classList.remove('is-success');
                        saveFeedback.classList.add('is-error');
                    }
                }
            });
        }
    </script>
</body>

</html>
